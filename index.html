<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080808;--bg2:#0f0f0f;--bg3:#161616;--bg4:#1d1d1d;
  --bd:rgba(255,255,255,0.06);--bd2:rgba(255,255,255,0.11);--bd3:rgba(255,255,255,0.18);
  --text:#f0ece6;--dim:rgba(240,236,230,0.55);--muted:rgba(240,236,230,0.28);
  --pink:#ff2d78;--orange:#F26419;--cyan:#00d4e8;--green:#22c55e;
  --red:#ef4444;--yellow:#eab308;--purple:#a855f7;
  --font:-apple-system,'SF Pro Text',BlinkMacSystemFont,'Helvetica Neue',sans-serif;--display:-apple-system,'SF Pro Display',BlinkMacSystemFont,'Helvetica Neue',sans-serif;--mono:'DM Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;overflow:hidden;}
::-webkit-scrollbar{width:3px;height:3px;}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px;}
button{cursor:pointer;font-family:var(--font);border:none;outline:none;background:none;}
input,textarea,select{font-family:var(--font);outline:none;background:none;border:none;color:var(--text);}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{to{transform:rotate(360deg);}}
.fade{animation:fadeIn .25s ease both;}
.shell{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;height:100vh;}
.sb-logo{padding:24px 20px 20px;border-bottom:1px solid var(--bd);}

.sb-sub{font-size:10px;color:var(--muted);margin-top:3px;letter-spacing:.5px;}
.sb-nav{padding:10px 8px;flex:1;}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;font-size:13px;font-weight:500;color:var(--dim);cursor:pointer;margin-bottom:2px;transition:all .15s;user-select:none;}
.sb-item:hover{background:var(--bg4);color:var(--text);}
.sb-item.active{background:rgba(255,45,120,.1);color:var(--pink);}
.sb-item .icon{font-size:15px;width:20px;flex-shrink:0;}
.sb-footer{padding:14px 16px;border-top:1px solid var(--bd);}
.sb-ft{font-size:10.5px;color:var(--muted);}
.main{flex:1;overflow-y:auto;overflow-x:hidden;}
.ph{padding:32px 40px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;}
.pt{font-family:var(--display);font-weight:700;font-size:24px;letter-spacing:-.02em;}
.ps{font-size:13px;color:var(--muted);margin-top:4px;}
.pb{padding:24px 40px 40px;}
.mg{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:28px;}
.mc{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:20px 18px;}
.ml{font-size:10.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.mv{font-family:var(--display);font-size:26px;font-weight:700;letter-spacing:-.02em;}
.ms{font-size:11.5px;color:var(--muted);margin-top:4px;}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;overflow:hidden;}
.ch{padding:18px 22px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;}
.ct{font-size:14px;font-weight:600;color:var(--text);}
.tbl{width:100%;border-collapse:collapse;}
.tbl th{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:10px 16px;text-align:left;border-bottom:1px solid var(--bd);white-space:nowrap;}
.tbl td{padding:13px 16px;border-bottom:1px solid var(--bd);font-size:13px;color:var(--dim);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:rgba(255,255,255,.015);}
.tbl td.s{color:var(--text);font-weight:600;}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:100px;font-size:10.5px;font-weight:700;letter-spacing:.3px;white-space:nowrap;}
.b-draft{background:rgba(240,236,230,.07);color:var(--dim);border:1px solid var(--bd2);}
.b-sent{background:rgba(0,212,232,.1);color:var(--cyan);border:1px solid rgba(0,212,232,.25);}
.b-deposit{background:rgba(234,179,8,.1);color:var(--yellow);border:1px solid rgba(234,179,8,.25);}
.b-partial{background:rgba(168,85,247,.1);color:var(--purple);border:1px solid rgba(168,85,247,.25);}
.b-paid{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.25);}
.b-overdue{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.25);}
.b-cancelled{background:rgba(240,236,230,.05);color:var(--muted);border:1px solid var(--bd);}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;transition:all .15s;cursor:pointer;}
.btn-p{background:var(--pink);color:#fff;border:1px solid var(--pink);}

.btn-g{background:rgba(255,255,255,.05);color:var(--dim);border:1px solid var(--bd2);}
.btn-g:hover{background:rgba(255,255,255,.08);color:var(--text);}
.btn-s{padding:6px 13px;font-size:12px;border-radius:6px;}
.btn-xs{padding:4px 9px;font-size:11px;border-radius:5px;}

.btn-ok{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2);}

.fg{margin-bottom:18px;}
.fl{font-size:10.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:7px;}
.fi{width:100%;background:var(--bg3);border:1px solid var(--bd2);border-radius:8px;padding:10px 13px;font-size:13.5px;color:var(--text);transition:border-color .15s;}
.fi:focus{border-color:var(--pink);}

.fi option{background:var(--bg3);}

.fr.c2{grid-template-columns:1fr 1fr;}
.fr.c3{grid-template-columns:1fr 1fr 1fr;}
.fr.c4{grid-template-columns:1fr 1fr 1fr 1fr;}
textarea.fi{resize:vertical;min-height:80px;line-height:1.6;}
.fst{font-family:var(--display);font-size:15px;font-weight:700;color:var(--text);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--bd);}
.li-hdr{display:grid;grid-template-columns:1fr 90px 130px 110px 40px;background:var(--bg3);}

.li-row{display:grid;grid-template-columns:1fr 90px 130px 110px 40px;border-bottom:1px solid var(--bd);}
.li-row:last-child{border-bottom:none;}

.li-cell input{width:100%;background:transparent;padding:6px 4px;font-size:13px;color:var(--text);}
.li-cell input::placeholder{color:var(--muted);}

.li-del:hover{color:var(--red);}
.li-tot{text-align:right;padding:16px 18px;background:var(--bg3);border-top:1px solid var(--bd);}

.lt-fin{font-size:16px;font-weight:700;color:var(--text);margin-top:8px;padding-top:8px;border-top:1px solid var(--bd2);}
.mb{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--bg2);border:1px solid var(--bd2);border-radius:16px;width:100%;max-width:640px;max-height:90vh;display:flex;flex-direction:column;animation:fadeIn .2s ease;}
.mxl{max-width:1060px;}
.mh{padding:20px 24px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.mt{font-family:var(--display);font-size:16px;font-weight:700;}
.mbody{padding:24px;overflow-y:auto;flex:1;}
.mf{padding:16px 24px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:10px;flex-shrink:0;}
.xbtn{width:30px;height:30px;border-radius:6px;background:var(--bg4);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:16px;cursor:pointer;}
.xbtn:hover{color:var(--text);}
.filters{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:20px;}
.sw{position:relative;flex:1;min-width:200px;}
.sw input{width:100%;background:var(--bg2);border:1px solid var(--bd2);border-radius:8px;padding:9px 13px 9px 36px;font-size:13px;color:var(--text);}
.sw input::placeholder{color:var(--muted);}
.sw input:focus{border-color:var(--pink);outline:none;}
.si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;}
.fs{background:var(--bg2);border:1px solid var(--bd2);border-radius:8px;padding:9px 13px;font-size:13px;color:var(--dim);cursor:pointer;min-width:130px;}
.fs:focus{outline:none;border-color:var(--pink);}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px;}
.cc{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:20px;}
.cc-t{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;}
.cc-s{font-size:11.5px;color:var(--muted);margin-bottom:16px;}
.divider{height:1px;background:var(--bd);margin:20px 0;}
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;background:rgba(255,255,255,.06);color:var(--dim);}
.mono{font-family:var(--mono);font-size:12px;}
.acts{display:flex;gap:6px;align-items:center;}
.ib{width:30px;height:30px;border-radius:6px;background:rgba(255,255,255,.04);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:13px;cursor:pointer;transition:all .15s;}
.ib:hover{background:rgba(255,255,255,.08);color:var(--text);}
.pb-bar{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;}
.pb-fill{height:100%;border-radius:2px;transition:width .3s;}
.notif{position:fixed;bottom:24px;right:24px;z-index:500;background:var(--bg3);border:1px solid var(--bd2);border-radius:10px;padding:12px 18px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;animation:fadeIn .2s ease;box-shadow:0 8px 32px rgba(0,0,0,.4);}
.notif.ok{border-color:rgba(34,197,94,.3);color:var(--green);}
.notif.err{border-color:rgba(239,68,68,.3);color:var(--red);}
.up-zone{border:1.5px dashed var(--bd2);border-radius:10px;padding:36px;text-align:center;cursor:pointer;}
.up-zone:hover{border-color:var(--pink);background:rgba(255,45,120,.04);}
.sg{display:grid;grid-template-columns:200px 1fr;gap:32px;}
.sn-item{padding:8px 12px;border-radius:7px;font-size:13px;font-weight:500;color:var(--dim);cursor:pointer;margin-bottom:2px;}
.sn-item:hover{background:var(--bg3);color:var(--text);}
.sn-item.active{background:rgba(255,45,120,.08);color:var(--pink);}
</style>
</head>

// ── helpers ──
const SYM={NGN:'₦',USD:'$',GBP:'£'};
function fc(n,cur){return (SYM[cur]||cur)+Number(n).toLocaleString('en-NG',{minimumFractionDigits:0,maximumFractionDigits:0});}
function fd(d){return d?new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}):'—';}
function nextId(){return 'INV-2026-'+String(S.invoices.length+1).padStart(3,'0');}
function calc(inv){
  const sub=(inv.items||[]).reduce((s,i)=>s+(+i.q||0)*(+i.p||0),0);
  const da=sub*((+inv.discount||0)/100),ad=sub-da;
  const ta=ad*((+inv.tax||0)/100),tot=ad+ta;
  const paid=(inv.payments||[]).reduce((s,p)=>s+(+p.amount||0),0);
  return{sub,da,ta,tot,paid,rem:Math.max(0,tot-paid)};
}
function sbadge(s){
  const m={draft:'Draft',sent:'Sent',deposit:'Deposit Req.',partial:'Partially Paid',paid:'Fully Paid',overdue:'Overdue',cancelled:'Cancelled'};
  const c={draft:'b-draft',sent:'b-sent',deposit:'b-deposit',partial:'b-partial',paid:'b-paid',overdue:'b-overdue',cancelled:'b-cancelled'};
  return `<span class="badge ${c[s]||'b-draft'}">${m[s]||s}</span>`;
}
function notify(msg,type='ok'){
  if(S.ntimer)clearTimeout(S.ntimer);
  S.notif={msg,type};render();
  S.ntimer=setTimeout(()=>{S.notif=null;render();},3000);
}
function nav(p){S.page=p;S.search='';render();}
function closeModal(){S.modal=null;S.editing=null;S.viewing=null;render();}

// ── dashboard ──
function rDash(){
  const invs=S.invoices;
  const exp=invs.filter(i=>i.status!=='cancelled'&&i.status!=='draft').reduce((s,i)=>s+calc(i).tot,0);
  const col=invs.reduce((s,i)=>s+calc(i).paid,0);
  const out=invs.filter(i=>['sent','deposit','partial'].includes(i.status));
  const over=invs.filter(i=>i.status==='overdue');
  const pct=Math.round(col/Math.max(1,exp)*100);
  return `
<div class="ph fade">
  <div><div class="pt">Dashboard</div><div class="ps">Financial overview · ${new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'long',year:'numeric'})}</div></div>

function openNew(){
  S.inv_form={id:nextId(),client:'',company:'',email:'',phone:'',address:'',project:'',category:'Brand Design',desc:'',date:new Date().toISOString().split('T')[0],due:new Date(Date.now()+14*864e5).toISOString().split('T')[0],currency:'NGN',items:[{d:'',q:1,p:0}],discount:0,tax:7.5,status:'draft',payments:[],account:'ngn-gtbank',notes:'',terms:true};
  S.modal='create';render();
}
function openNewForClient(email){
  const cl=S.clients.find(c=>c.email===email);
  openNew();
  if(cl&&S.inv_form){S.inv_form.client=cl.contact;S.inv_form.company=cl.name;S.inv_form.email=cl.email;S.inv_form.phone=cl.phone;S.inv_form.address=cl.address;}
  render();
}
function editInv(id){
  const inv=S.invoices.find(i=>i.id===id);
  S.inv_form=JSON.parse(JSON.stringify(inv));S.editing=id;S.modal='create';S.viewing=null;render();
}
function saveInv(){

}

function subPay(id){
  const amt=parseFloat(document.getElementById('pa').value)||0;
  const date=document.getElementById('pd').value;
  const method=document.getElementById('pm').value;
  const ref=document.getElementById('pr').value;
  if(!amt||!date){notify('Fill amount and date','err');return;}
  const inv=S.invoices.find(i=>i.id===id);if(!inv)return;
  inv.payments.push({amount:amt,date,method,ref});
  const c2=calc(inv);
  if(c2.rem<=0)inv.status='paid';else if(c2.paid>0)inv.status='partial';
  closeModal();notify(`Payment of ${fc(amt,inv.currency)} recorded`);
}

function updStatus(id,status){const inv=S.invoices.find(i=>i.id===id);if(inv){inv.status=status;notify('Status → '+status);render();}}
function dupInv(id){
  const inv=S.invoices.find(i=>i.id===id);if(!inv)return;
  const d=JSON.parse(JSON.stringify(inv));
  d.id=nextId();d.status='draft';d.payments=[];
  d.date=new Date().toISOString().split('T')[0];
  d.due=new Date(Date.now()+14*864e5).toISOString().split('T')[0];
  S.invoices.unshift(d);notify('Duplicated · '+d.id);render();
}
