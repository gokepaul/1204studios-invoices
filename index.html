<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>1204Studios — Invoicing</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080808;--bg2:#0f0f0f;--bg3:#161616;--bg4:#1d1d1d;
  --bd:rgba(255,255,255,0.06);--bd2:rgba(255,255,255,0.11);--bd3:rgba(255,255,255,0.18);
  --text:#f0ece6;--dim:rgba(240,236,230,0.55);--muted:rgba(240,236,230,0.28);
  --pink:#ff2d78;--orange:#F26419;--cyan:#00d4e8;--green:#22c55e;
  --red:#ef4444;--yellow:#eab308;--purple:#a855f7;
  --font:-apple-system,'SF Pro Text',BlinkMacSystemFont,'Helvetica Neue',sans-serif;--display:-apple-system,'SF Pro Display',BlinkMacSystemFont,'Helvetica Neue',sans-serif;--mono:'DM Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:3px;height:3px;}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px;}
button{cursor:pointer;font-family:var(--font);border:none;outline:none;background:none;}
input,textarea,select{font-family:var(--font);outline:none;background:none;border:none;color:var(--text);}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{to{transform:rotate(360deg);}}
.fade{animation:fadeIn .25s ease both;}
.shell{display:flex;height:100vh;overflow:hidden;width:100%;}
.sidebar{width:208px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;height:100vh;}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid var(--bd);}

.sb-sub{font-size:10px;color:var(--muted);margin-top:3px;letter-spacing:.5px;}
.sb-nav{padding:10px 8px;flex:1;}
.sb-item{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:7px;font-size:13px;font-weight:500;color:var(--dim);cursor:pointer;margin-bottom:1px;transition:all .15s;user-select:none;}
.sb-item:hover{background:var(--bg4);color:var(--text);}
.sb-item.active{background:rgba(255,45,120,.1);color:var(--pink);}
.sb-item .icon{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.sb-footer{padding:14px 16px;border-top:1px solid var(--bd);}
.sb-ft{font-size:10.5px;color:var(--muted);}
.main{flex:1;overflow-y:auto;overflow-x:hidden;min-width:0;height:100%;}
.ph{padding:24px 36px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;}
.pt{font-family:var(--display);font-weight:700;font-size:21px;letter-spacing:-.02em;}
.ps{font-size:13px;color:var(--muted);margin-top:4px;}
.pb{padding:18px 36px 36px;}
.mg{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;margin-bottom:22px;}
.mc{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:16px 15px;}
.ml{font-size:10.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.mv{font-family:var(--display);font-size:22px;font-weight:700;letter-spacing:-.02em;}
.ms{font-size:11.5px;color:var(--muted);margin-top:4px;}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;overflow:hidden;}
.ch{padding:14px 18px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;}
.ct{font-size:14px;font-weight:600;color:var(--text);}
.tbl{width:100%;border-collapse:collapse;}
.tbl th{font-size:9.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:8px 14px;text-align:left;border-bottom:1px solid var(--bd);white-space:nowrap;}
.tbl td{padding:10px 14px;border-bottom:1px solid var(--bd);font-size:13px;color:var(--dim);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:rgba(255,255,255,.015);}
.tbl td.s{color:var(--text);font-weight:600;}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:100px;font-size:10.5px;font-weight:700;letter-spacing:.3px;white-space:nowrap;}
.b-draft{background:rgba(240,236,230,.07);color:var(--dim);border:1px solid var(--bd2);}
.b-sent{background:rgba(0,212,232,.1);color:var(--cyan);border:1px solid rgba(0,212,232,.25);}
.b-deposit{background:rgba(234,179,8,.1);color:var(--yellow);border:1px solid rgba(234,179,8,.25);}
.b-partial{background:rgba(168,85,247,.1);color:var(--purple);border:1px solid rgba(168,85,247,.25);}
.b-paid{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.25);}
.b-overdue{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.25);}
.b-cancelled{background:rgba(240,236,230,.05);color:var(--muted);border:1px solid var(--bd);}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:600;transition:all .15s;cursor:pointer;}
.btn-p{background:var(--pink);color:#fff;border:1px solid var(--pink);}
.btn-p:hover{opacity:.88;}
.btn-g{background:rgba(255,255,255,.05);color:var(--dim);border:1px solid var(--bd2);}
.btn-g:hover{background:rgba(255,255,255,.08);color:var(--text);}
.btn-s{padding:6px 13px;font-size:12px;border-radius:6px;}
.btn-xs{padding:4px 9px;font-size:11px;border-radius:5px;}
.btn-d{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2);}
.btn-ok{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2);}
.btn-dl{background:rgba(0,212,232,.08);color:var(--cyan);border:1px solid rgba(0,212,232,.2);}
.btn-dl:hover{background:rgba(0,212,232,.15);}
.fg{margin-bottom:14px;}
.fl{font-size:10.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:7px;}
.fi{width:100%;background:var(--bg3);border:1px solid var(--bd2);border-radius:8px;padding:10px 13px;font-size:13.5px;color:var(--text);transition:border-color .15s;}
.fi:focus{border-color:var(--pink);}
.fi::placeholder{color:var(--muted);}
.fi option{background:var(--bg3);}
.fr{display:grid;gap:16px;}
.fr.c2{grid-template-columns:1fr 1fr;}
.fr.c3{grid-template-columns:1fr 1fr 1fr;}
.fr.c4{grid-template-columns:1fr 1fr 1fr 1fr;}
textarea.fi{resize:vertical;min-height:80px;line-height:1.6;}
.fst{font-family:var(--display);font-size:15px;font-weight:700;color:var(--text);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--bd);}
.li-hdr{display:grid;grid-template-columns:1fr 90px 130px 110px 40px;background:var(--bg3);}
.li-hdr div{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:10px 12px;border-bottom:1px solid var(--bd);}
.li-row{display:grid;grid-template-columns:1fr 90px 130px 110px 40px;border-bottom:1px solid var(--bd);}
.li-row:last-child{border-bottom:none;}
.li-cell{padding:6px 8px;display:flex;align-items:center;}
.li-cell input{width:100%;background:transparent;padding:6px 4px;font-size:13px;color:var(--text);}
.li-cell input::placeholder{color:var(--muted);}
.li-del{cursor:pointer;color:var(--muted);font-size:18px;display:flex;align-items:center;justify-content:center;width:100%;height:100%;}
.li-del:hover{color:var(--red);}
.li-tot{text-align:right;padding:16px 18px;background:var(--bg3);border-top:1px solid var(--bd);}
.lt-row{display:flex;justify-content:space-between;font-size:13px;color:var(--dim);margin-bottom:6px;}
.lt-fin{font-size:16px;font-weight:700;color:var(--text);margin-top:8px;padding-top:8px;border-top:1px solid var(--bd2);}
.mb{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--bg2);border:1px solid var(--bd2);border-radius:16px;width:100%;max-width:640px;max-height:90vh;display:flex;flex-direction:column;animation:fadeIn .2s ease;}
.mxl{max-width:1060px;}
.mh{padding:16px 22px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.mt{font-family:var(--display);font-size:16px;font-weight:700;}
.mbody{padding:20px 22px;overflow-y:auto;flex:1;}
.mf{padding:16px 24px;border-top:1px solid var(--bd);display:flex;justify-content:flex-end;gap:10px;flex-shrink:0;}
.xbtn{width:30px;height:30px;border-radius:6px;background:var(--bg4);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:16px;cursor:pointer;}
.xbtn:hover{color:var(--text);}
.filters{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:16px;min-height:36px;}
.sw{position:relative;flex:1;min-width:200px;}
.sw input{width:100%;background:var(--bg2);border:1px solid var(--bd2);border-radius:8px;padding:8px 12px 8px 34px;font-size:13px;color:var(--text);}
.sw input::placeholder{color:var(--muted);}
.sw input:focus{border-color:var(--pink);outline:none;}
.si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;}
.fs{background:var(--bg2);border:1px solid var(--bd2);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--dim);cursor:pointer;min-width:130px;appearance:auto;}
.fs:focus{outline:none;border-color:var(--pink);}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
.cc{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:16px;}
.cc-t{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;}
.cc-s{font-size:11.5px;color:var(--muted);margin-bottom:16px;}
.divider{height:1px;background:var(--bd);margin:20px 0;}
.empty{text-align:center;padding:60px 20px;color:var(--muted);}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;background:rgba(255,255,255,.06);color:var(--dim);}
.mono{font-family:var(--mono);font-size:12px;}
.acts{display:flex;gap:6px;align-items:center;}
.ib{width:30px;height:30px;border-radius:6px;background:rgba(255,255,255,.04);border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:13px;cursor:pointer;transition:all .15s;}
.ib:hover{background:rgba(255,255,255,.08);color:var(--text);}
.pb-bar{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;}
.pb-fill{height:100%;border-radius:2px;transition:width .3s;}
.notif{position:fixed;bottom:24px;right:24px;z-index:500;background:var(--bg3);border:1px solid var(--bd2);border-radius:10px;padding:12px 18px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;animation:fadeIn .2s ease;box-shadow:0 8px 32px rgba(0,0,0,.4);}
.notif.ok{border-color:rgba(34,197,94,.3);color:var(--green);}
.notif.err{border-color:rgba(239,68,68,.3);color:var(--red);}
.up-zone{border:1.5px dashed var(--bd2);border-radius:10px;padding:36px;text-align:center;cursor:pointer;}
.up-zone:hover{border-color:var(--pink);background:rgba(255,45,120,.04);}
.sg{display:grid;grid-template-columns:200px 1fr;gap:32px;}
.sn-item{padding:8px 12px;border-radius:7px;font-size:13px;font-weight:500;color:var(--dim);cursor:pointer;margin-bottom:2px;}
.sn-item:hover{background:var(--bg3);color:var(--text);}
.sn-item.active{background:rgba(255,45,120,.08);color:var(--pink);}

/* ═══════════ MOBILE RESPONSIVE ═══════════ */

/* Mobile top bar — hidden on desktop */
.app-root{display:contents;height:100%;}
/* ═══════ MOB TOP BAR (hidden on desktop) ═══════ */
.mob-bar{
  display:none;
  height:52px;background:var(--bg2);border-bottom:1px solid var(--bd);
  align-items:center;justify-content:space-between;padding:0 16px;
  flex-shrink:0;position:relative;z-index:10;
}
.mob-bar-logo{height:22px;width:auto;display:block;}
.mob-toggle{
  width:38px;height:38px;border-radius:8px;background:var(--bg3);
  border:1px solid var(--bd2);display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;color:var(--dim);flex-shrink:0;
}
.mob-toggle:active{background:var(--bg4);}

/* Sidebar backdrop overlay */
.sb-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.65);backdrop-filter:blur(3px);z-index:149;
}
.sb-overlay.open{display:block;}

/* Sidebar close pill — mobile only, hidden on desktop */
.sb-close{display:none;padding:8px 10px 0;text-align:right;}
.sb-close button{
  background:rgba(255,255,255,.06);border:1px solid var(--bd2);
  color:var(--muted);font-size:12px;font-weight:600;
  padding:5px 12px;border-radius:20px;cursor:pointer;
}

/* ═══════ DESKTOP ≥ 1025px ═══════ */
@media(min-width:1025px){
  html,body{overflow:hidden;}
  .shell{display:flex;height:100vh;overflow:hidden;}
  .sidebar{
    width:208px;flex-shrink:0;position:relative;
    transform:none !important;z-index:1;
    overflow-y:auto;
  }
  .mob-bar{display:none !important;}
  .sb-overlay{display:none !important;}
  .sb-close{display:none !important;}
  .main-wrap{flex:1;min-width:0;overflow:hidden;display:flex;flex-direction:column;}
  .main{flex:1;overflow-y:auto;overflow-x:hidden;}
}

/* ═══════ TABLET 769–1024px ═══════ */
@media(min-width:769px) and (max-width:1024px){
  html,body{overflow:hidden;}
  .shell{display:flex;height:100vh;overflow:hidden;}
  .sidebar{
    width:188px;flex-shrink:0;position:relative;
    transform:none !important;z-index:1;
    overflow-y:auto;
  }
  .mob-bar{display:none !important;}
  .sb-overlay{display:none !important;}
  .sb-close{display:none !important;}
  .main-wrap{flex:1;min-width:0;overflow:hidden;display:flex;flex-direction:column;}
  .main{flex:1;overflow-y:auto;overflow-x:hidden;}

  /* Tablet layout adjustments */
  .ph{padding:18px 22px 0;}
  .pb{padding:14px 22px 32px;}
  .sb-item span:not(.icon){font-size:12.5px;}
  .mg{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));}
  .cg{grid-template-columns:1fr;}
  .fr.c4{grid-template-columns:1fr 1fr;}
  .fr.c3{grid-template-columns:1fr 1fr;}
  .mbody[data-cols="2"]{display:block;}
}

/* ═══════ MOBILE ≤ 768px ═══════ */
@media(max-width:768px){
  html,body{overflow:hidden;height:100%;height:100dvh;}

  /* App root = full page flex column — fills entire device viewport */
  .app-root{
    display:flex !important;
    flex-direction:column;
    height:100dvh;
    max-height:100dvh;
    overflow:hidden;
  }

  /* Shell fills remaining space below top bar */
  .shell{
    display:flex;flex:1;
    height:auto;min-height:0;overflow:visible;
    width:100%;
  }

  /* Mobile top bar — shown, sticky at top */
  .mob-bar{display:flex !important;flex-shrink:0;width:100%;}

  /* Sidebar — off-screen drawer */
  .sidebar{
    position:fixed !important;
    top:0;left:0;height:100dvh;
    width:240px !important;
    z-index:150;
    transform:translateX(-100%);
    transition:transform .26s cubic-bezier(.4,0,.2,1);
    overflow-y:auto;
  }
  .sidebar.open{transform:translateX(0) !important;}
  .sb-close{display:block;}

  /* Main wraps normally, fills shell — must stretch to fill viewport */
  .main-wrap{flex:1;width:100%;min-width:0;overflow:visible;display:flex;flex-direction:column;}
  .main{overflow:visible;flex:1;min-height:0;}

  /* Page spacing */
  .ph{padding:14px 14px 0;flex-wrap:wrap;gap:8px;align-items:center;}
  .ph>div:first-child{flex:1;min-width:0;}
  .pt{font-size:17px;}
  .ps{font-size:11.5px;margin-top:2px;}
  .pb{padding:12px 14px 48px;}

  /* Metric grid — 2 col */
  .mg{grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px;}
  .mc{padding:12px 10px;}
  .mv{font-size:18px;}
  .ml{font-size:9px;letter-spacing:1px;margin-bottom:6px;}
  .ms{font-size:10.5px;}

  /* Charts — single col */
  .cg{grid-template-columns:1fr;gap:8px;margin-bottom:12px;}
  .cc{padding:13px;}
  .cc canvas{max-height:150px !important;}

  /* Tables — scrollable container */
  .card{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .tbl{min-width:580px;}
  .tbl td,.tbl th{padding:9px 12px;}

  /* Filters — stacked */
  .filters{flex-direction:column;align-items:stretch;gap:7px;}
  .sw,.fs{width:100%;min-width:0;}
  .sw input{padding-left:34px;}

  /* Page header buttons — compact */
  .ph .btn,.ph .btn-p,.ph .btn-g{padding:7px 12px;font-size:12px;white-space:nowrap;}

  /* All form grids → single column */
  .fr.c2,.fr.c3,.fr.c4{grid-template-columns:1fr !important;}

  /* Modal — slides up from bottom */
  .mb{padding:0 !important;align-items:flex-end !important;}
  .modal,.mxl{
    max-width:100% !important;
    width:100% !important;
    border-radius:18px 18px 0 0 !important;
    max-height:92dvh !important;
    border-bottom:none !important;
  }
  .mh{padding:14px 16px;}
  .mbody{padding:14px 16px !important;display:block !important;}
  /* Stack any inline grid layout inside modal body */
  .mbody>*{display:block !important;width:100% !important;}
  .mbody>*+*{margin-top:14px;}
  /* But keep table cells as-is */
  .mbody td,.mbody th,.mbody tr{display:revert !important;width:revert !important;}
  .mf{padding:12px 16px;}

  /* Line items — horizontal scroll */
  .li-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .li-hdr,.li-row{min-width:500px;}

  /* Settings nav → horizontal pills on mobile */
  .sg{grid-template-columns:1fr !important;gap:12px;}
  .sg>div:first-child{display:flex;flex-wrap:wrap;gap:6px;}
  .sn-item{padding:6px 12px;border-radius:20px;font-size:12px;background:var(--bg3);}
  .sn-item.active{background:rgba(255,45,120,.12);}

  /* Notifications */
  .notif{
    bottom:14px;right:12px;left:12px;
    font-size:12px;padding:10px 14px;
    border-radius:10px;
  }

  /* Icon buttons — larger tap area */
  .ib{width:36px;height:36px;font-size:14px;}
  .btn-dl.btn-xs,.btn-xs{padding:6px 10px;font-size:11.5px;}

  /* Two-col view invoice layout → single col */
  .view-grid{display:block !important;}
  .view-grid>*+*{margin-top:18px;}

  /* Accounts grid → single col */
  .acc-grid{grid-template-columns:1fr !important;}
}

/* ── AUTH WALL ── */
.auth-wall{position:fixed;inset:0;background:var(--bg);z-index:1000;
  display:flex;align-items:center;justify-content:center;padding:20px;}
.auth-box{background:var(--bg2);border:1px solid var(--bd2);border-radius:18px;
  width:100%;max-width:360px;padding:36px 32px;animation:fadeIn .3s ease;}
.auth-logo{margin-bottom:28px;}
.auth-logo img{height:28px;width:auto;display:block;}
.auth-title{font-family:var(--display);font-size:20px;font-weight:700;
  color:var(--text);margin-bottom:6px;letter-spacing:-.02em;}
.auth-sub{font-size:13px;color:var(--muted);margin-bottom:26px;}
.auth-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);
  border-radius:8px;padding:10px 13px;font-size:13px;color:var(--red);
  margin-bottom:16px;}
</style>
</head>
<body>
<div class="shell" id="app"></div>
<script>
const S={
  page:'dashboard',stab:'studio',notif:null,ntimer:null,
  search:'',fstatus:'all',fcat:'all',fperiod:'year',
  modal:null,editing:null,viewing:null,inv_form:null,dbLoading:false,authed:false,authErr:'',reportTab:'pl',
  invoices:[],
  clients:[],
  accounts:[
    {id:'ngn-gtbank',label:'NGN — GTBank',bank:'',aname:'',anum:'',swift:'',currency:'NGN',instr:'Please include invoice number as payment reference.'},
    {id:'usd-account',label:'USD — Bank / Wise',bank:'',aname:'',anum:'',swift:'',currency:'USD',instr:'USD transfers. Include invoice number in reference.'},
    {id:'gbp-account',label:'GBP — Bank / Wise',bank:'',aname:'',anum:'',swift:'',currency:'GBP',instr:'GBP transfers. Include invoice number in reference.'},
  ],
  presets:[
    {name:'Brand Identity Design',price:850000,cur:'NGN'},

// ── localStorage fallback (used when Supabase not yet configured) ──
const LS_KEY = '1204studios_invoices_v1';
function lsSave(){
  try{ localStorage.setItem(LS_KEY, JSON.stringify({invoices:S.invoices,clients:S.clients,accounts:S.accounts,presets:S.presets,cfg:S.cfg,expenses:S.expenses,coa:S.coa})); }catch(e){}
}
function lsLoad(){
  try{
    const raw = localStorage.getItem(LS_KEY); if(!raw) return;
    const d = JSON.parse(raw);
    if(d.invoices) S.invoices = d.invoices;
    if(d.clients)  S.clients  = d.clients;
    if(d.accounts) S.accounts = d.accounts;
    if(d.presets)  S.presets  = d.presets;
    if(d.cfg)      S.cfg      = Object.assign(S.cfg, d.cfg);
    if(d.expenses) S.expenses = d.expenses;
    if(d.coa && d.coa.length) S.coa = d.coa;
  }catch(e){}
}

// ── Supabase CRUD helpers ──
async function sbUpsertInvoice(inv){
  if(!db) return lsSave();
  const row = {...inv, items:JSON.stringify(inv.items||[]), payments:JSON.stringify(inv.payments||[])};
  const {error} = await db.from('invoices').upsert(row, {onConflict:'id'});
  if(error) console.error('sbUpsertInvoice',error);
  lsSave();
}
async function sbDeleteInvoice(id){
  if(!db) return lsSave();
  await db.from('invoices').delete().eq('id',id);
  lsSave();
}
async function sbUpsertClient(cl){
  if(!db) return lsSave();
  const {error} = await db.from('clients').upsert(cl, {onConflict:'id'});
  if(error) console.error('sbUpsertClient',error);
  lsSave();
}
async function sbUpsertAccount(acc){
  if(!db) return lsSave();
  const {error} = await db.from('accounts').upsert(acc, {onConflict:'id'});
  if(error) console.error('sbUpsertAccount',error);
  lsSave();
}
async function sbUpsertExpense(exp){
  if(!db) return lsSave();
  const {error}=await db.from('expenses').upsert(exp,{onConflict:'id'});
  if(error) console.error('sbUpsertExpense',error); lsSave();
}
async function sbDeleteExpense(id){
  if(!db) return lsSave();
  await db.from('expenses').delete().eq('id',id); lsSave();
}
async function sbSaveSettings(cfg){
  if(!db) return lsSave();
  const rows = Object.entries(cfg).map(([key,value])=>({key,value:JSON.stringify(value)}));
  const {error} = await db.from('settings').upsert(rows, {onConflict:'key'});
  if(error) console.error('sbSaveSettings',error);
  lsSave();
}
async function sbSavePresets(presets){
  if(!db) return lsSave();
  // Delete all then re-insert
  await db.from('presets').delete().neq('id',0);
  if(presets.length>0){
    const {error} = await db.from('presets').insert(presets.map((p,i)=>({name:p.name,price:p.price,cur:p.cur})));
    if(error) console.error('sbSavePresets',error);
  }
  lsSave();
}

// ── Load all data from Supabase on startup ──
async function loadFromSupabase(){
  if(!db){ lsLoad(); return; }
  S.dbLoading = true; render();
  try{
    const [invRes, clRes, accRes, prRes, stRes, expRes2] = await Promise.all([
      db.from('invoices').select('*').order('created_at',{ascending:false}),
      db.from('clients').select('*').order('created_at',{ascending:false}),
      db.from('accounts').select('*').order('created_at',{ascending:false}),
      db.from('presets').select('*').order('id'),
      db.from('settings').select('*'),
      db.from('expenses').select('*').order('date',{ascending:false}),
    ]);
    if(invRes.data) S.invoices = invRes.data.map(r=>({
      ...r,
      items:    typeof r.items    === 'string' ? JSON.parse(r.items||'[]')    : (r.items||[]),
      payments: typeof r.payments === 'string' ? JSON.parse(r.payments||'[]') : (r.payments||[]),
    }));
    if(clRes.data)  S.clients  = clRes.data;
    if(accRes.data && accRes.data.length > 0) S.accounts = accRes.data;
    if(prRes.data  && prRes.data.length  > 0) S.presets  = prRes.data;
    if(stRes.data){
      stRes.data.forEach(row=>{
        try{ S.cfg[row.key] = JSON.parse(row.value); }catch(e){ S.cfg[row.key] = row.value; }
      });
    }
    if(expRes2&&expRes2.data) S.expenses=expRes2.data;
    lsSave(); // keep local copy in sync
  }catch(e){
    console.error('Supabase load failed, falling back to localStorage',e);
    lsLoad();
  }
  S.dbLoading = false; render();
}

const SYM={NGN:'₦',USD:'$',GBP:'£'};
function fc(n,cur){return (SYM[cur]||cur)+Number(n).toLocaleString('en-NG',{minimumFractionDigits:0,maximumFractionDigits:0});}
function fd(d){return d?new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}):'—';}
function nextId(){
  const yr=new Date().getFullYear();
  const prefix='INV-'+yr+'-';
  const used=S.invoices.filter(i=>i.id.startsWith(prefix)).length;
  return prefix+String(used+1).padStart(3,'0');
}
function catToCoaCode(cat){
  const m={'Brand Design':'4100','Marketing Campaigns':'4200','Print Media':'4300','Design & Web Tutoring':'4400'};
  return m[cat]||'4900';
}
function calc(inv){
  const sub=(inv.items||[]).reduce((s,i)=>s+(+i.q||0)*(+i.p||0),0);
  const da=sub*((+inv.discount||0)/100),ad=sub-da;
  const ta=ad*((+inv.tax||0)/100),tot=ad+ta;
  const paid=(inv.payments||[]).reduce((s,p)=>s+(+p.amount||0),0);
  return{sub,da,ta,tot,paid,rem:Math.max(0,tot-paid)};
}
function sbadge(s){
  const m={draft:'Draft',sent:'Sent',deposit:'Deposit Req.',partial:'Partially Paid',paid:'Fully Paid',overdue:'Overdue',cancelled:'Cancelled'};
  const c={draft:'b-draft',sent:'b-sent',deposit:'b-deposit',partial:'b-partial',paid:'b-paid',overdue:'b-overdue',cancelled:'b-cancelled'};
  return `<span class="badge ${c[s]||'b-draft'}">${m[s]||s}</span>`;
}

function getPeriodInvoices(){
  const now=new Date();
  const p=S.fperiod;
  return S.invoices.filter(inv=>{
    if(!inv.date) return p==='all';
    const d=new Date(inv.date);
    if(p==='today'){
      return d.toDateString()===now.toDateString();
    } else if(p==='week'){
      const start=new Date(now); start.setDate(now.getDate()-now.getDay());
      start.setHours(0,0,0,0);
      return d>=start;
    } else if(p==='month'){
      return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    } else if(p==='quarter'){
      const q=Math.floor(now.getMonth()/3);
      return Math.floor(d.getMonth()/3)===q&&d.getFullYear()===now.getFullYear();
    } else if(p==='year'){
      return d.getFullYear()===now.getFullYear();
    }
    return true; // all
  });
}

function openNew(){

  S.modal='create';render();
}
function openNewForClient(email){
  const cl=S.clients.find(c=>c.email===email);
  openNew();
  if(cl&&S.inv_form){S.inv_form.client=cl.contact;S.inv_form.company=cl.name;S.inv_form.email=cl.email;S.inv_form.phone=cl.phone;S.inv_form.address=cl.address;}
  render();
}
function editInv(id){
  const inv=S.invoices.find(i=>i.id===id);
  S.inv_form=JSON.parse(JSON.stringify(inv));S.editing=id;S.modal='create';S.viewing=null;render();
}
async function saveInv(){
  const inv=S.inv_form;
  if(!inv.client){notify('Client name is required','err');return;}
  if(!inv.project){notify('Project name is required','err');return;}
  if(S.editing){
    const idx=S.invoices.findIndex(i=>i.id===S.editing);
    if(idx>=0) S.invoices[idx]=inv;
    notify('Saving…');
    await sbUpsertInvoice(inv);
    notify('Invoice updated ✓');
  } else {
    S.invoices.unshift(inv);
    // auto-save client if new
    if(inv.email&&!S.clients.find(c=>c.email===inv.email)){
      const nc={id:'c'+Date.now(),name:inv.company||inv.client,contact:inv.client,email:inv.email,phone:inv.phone,address:inv.address};
      S.clients.push(nc);
      sbUpsertClient(nc);
    }
    notify('Saving…');
    await sbUpsertInvoice(inv);
    notify('Invoice saved · '+inv.id+' ✓');
  }
  S.modal=null;S.editing=null;render();
}

        <div class="fg"><label class="fl">Company</label><input class="fi" value="${inv.company}" oninput="S.inv_form.company=this.value" placeholder="Company"/></div>
        <div class="fg"><label class="fl">Email</label><input class="fi" type="email" value="${inv.email}" oninput="S.inv_form.email=this.value" placeholder="email@co.com"/></div>
        <div class="fg"><label class="fl">Phone</label><input class="fi" value="${inv.phone}" oninput="S.inv_form.phone=this.value" placeholder="+234…"/></div>
      </div>
      <div class="fg"><label class="fl">Address</label><input class="fi" value="${inv.address}" oninput="S.inv_form.address=this.value" placeholder="Full address"/></div>

      <div class="fst">Project</div>

      <div class="fr c3">
        <div class="fg"><label class="fl">Invoice #</label><input class="fi" value="${inv.id}" readonly style="opacity:.6"/></div>

        <button class="btn btn-g btn-xs" onclick="addLI()">+ Add</button>
      </div>

        <div class="li-hdr"><div>Description</div><div>Qty</div><div>Unit Price</div><div>Subtotal</div><div></div></div>
        ${(inv.items||[]).map((item,i)=>{const sub=(+item.q||0)*(+item.p||0);return`<div class="li-row">
          <div class="li-cell"><input value="${item.d}" oninput="S.inv_form.items[${i}].d=this.value" placeholder="Description"/></div>
          <div class="li-cell"><input type="number" min="1" value="${item.q}" oninput="S.inv_form.items[${i}].q=parseFloat(this.value)||1;rliTotals()" style="width:60px"/></div>
          <div class="li-cell"><input type="number" min="0" value="${item.p}" oninput="S.inv_form.items[${i}].p=parseFloat(this.value)||0;rliTotals()" style="width:110px"/></div>
          <div class="li-cell" style="font-size:13px;color:var(--text);font-weight:600;padding:6px 12px">${fc(sub,inv.currency)}</div>
          <div class="li-cell li-del" onclick="remLI(${i})">✕</div>
        </div>`;}).join('')}
        <div class="li-tot" id="li-tots">
          <div class="lt-row"><span>Subtotal</span><span>${fc(c2.sub,inv.currency)}</span></div>
          <div class="lt-row" style="gap:12px"><span>Discount <input type="number" min="0" max="100" value="${inv.discount}" oninput="S.inv_form.discount=parseFloat(this.value)||0;rliTotals()" style="width:44px;font-size:13px;color:var(--text);background:var(--bg4);border:1px solid var(--bd);border-radius:4px;padding:2px 6px"/>%</span><span style="color:var(--green)">−${fc(c2.da,inv.currency)}</span></div>
          <div class="lt-row" style="gap:12px"><span>VAT <input type="number" min="0" max="100" value="${inv.tax}" oninput="S.inv_form.tax=parseFloat(this.value)||0;rliTotals()" style="width:44px;font-size:13px;color:var(--text);background:var(--bg4);border:1px solid var(--bd);border-radius:4px;padding:2px 6px"/>%</span><span>+${fc(c2.ta,inv.currency)}</span></div>
          <div class="lt-row lt-fin"><span>Total</span><span>${fc(c2.tot,inv.currency)}</span></div>
        </div>
      </div>
      <div class="fr c2">
        <div class="fg"><label class="fl">Status</label>
          <select class="fi" onchange="S.inv_form.status=this.value">${['draft','sent','deposit','partial','paid','overdue','cancelled'].map(s=>`<option value="${s}" ${inv.status===s?'selected':''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}</select></div>
        <div class="fg"><label class="fl">Payment Account</label>
          <select class="fi" onchange="S.inv_form.account=this.value">${S.accounts.map(a=>`<option value="${a.id}" ${inv.account===a.id?'selected':''}>${a.label}</option>`).join('')}</select></div>
      </div>
      <div class="fg"><label class="fl">Notes</label><input class="fi" value="${inv.notes}" oninput="S.inv_form.notes=this.value" placeholder="Internal notes…"/></div>
      <div style="display:flex;align-items:center;gap:8px">
        <input type="checkbox" id="tc" ${inv.terms?'checked':''} onchange="S.inv_form.terms=this.checked" style="accent-color:var(--pink);width:14px;height:14px"/>
        <label for="tc" style="font-size:13px;color:var(--dim);cursor:pointer">Append default T&C to PDF</label>
      </div>
    </div>
  </div>
</div></div>`;}

function recPay(id){S.viewing=id;S.modal='pay';render();}
function rPayModal(){
  const inv=S.invoices.find(i=>i.id===S.viewing);if(!inv)return'';
  const c2=calc(inv);
  return`
<div class="mb fade" onclick="if(event.target===this)closeModal()">
<div class="modal">
  <div class="mh"><div class="mt">Record Payment</div><div class="xbtn" onclick="closeModal()">✕</div></div>
  <div class="mbody">
    <div style="background:var(--bg3);border-radius:8px;padding:14px;margin-bottom:20px">
      <div style="font-size:12px;color:var(--muted);margin-bottom:4px">${inv.id} · ${inv.client}</div>
      <div style="display:flex;justify-content:space-between">
        <div><div style="font-size:11px;color:var(--muted)">Total</div><div style="font-family:var(--display);font-size:18px;font-weight:700">${fc(c2.tot,inv.currency)}</div></div>
        <div><div style="font-size:11px;color:var(--muted)">Remaining</div><div style="font-family:var(--display);font-size:18px;font-weight:700;color:var(--orange)">${fc(c2.rem,inv.currency)}</div></div>
        <div><div style="font-size:11px;color:var(--muted)">Paid</div><div style="font-family:var(--display);font-size:18px;font-weight:700;color:var(--green)">${fc(c2.paid,inv.currency)}</div></div>
      </div>
    </div>
    <div class="fr c2">
      <div class="fg"><label class="fl">Amount Paid</label><input class="fi" type="number" id="pa" value="${c2.rem}" min="0"/></div>
      <div class="fg"><label class="fl">Payment Date</label><input class="fi" type="date" id="pd" value="${new Date().toISOString().split('T')[0]}"/></div>
    </div>
    <div class="fr c2">
      <div class="fg"><label class="fl">Method</label>
        <select class="fi" id="pm"><option>Bank Transfer</option><option>Paystack</option><option>Stripe</option><option>Cash</option><option>Cheque</option><option>Wise</option></select></div>
      <div class="fg"><label class="fl">Reference</label><input class="fi" id="pr" placeholder="Transaction ref…"/></div>
    </div>
  </div>
  <div class="mf">
    <button class="btn btn-g" onclick="closeModal()">Cancel</button>
    <button class="btn btn-ok" onclick="subPay('${inv.id}')">Record Payment</button>
  </div>
</div></div>`;}

async function subPay(id){
  const amt=parseFloat(document.getElementById('pa').value)||0;
  const date=document.getElementById('pd').value;
  const method=document.getElementById('pm').value;
  const ref=document.getElementById('pr').value;
  if(!amt||!date){notify('Fill amount and date','err');return;}
  const inv=S.invoices.find(i=>i.id===id);if(!inv)return;
  inv.payments.push({amount:amt,date,method,ref});
  const c2=calc(inv);
  if(c2.rem<=0)inv.status='paid';else if(c2.paid>0)inv.status='partial';
  closeModal();
  await sbUpsertInvoice(inv);
  notify(`Payment of ${fc(amt,inv.currency)} recorded ✓`);
}

  const html=`<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<title>${inv.id} — 1204Studios</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:-apple-system,'SF Pro Text',BlinkMacSystemFont,'Helvetica Neue',sans-serif;
    font-size:12.5px;color:#111;background:#fff;
    -webkit-print-color-adjust:exact;print-color-adjust:exact;
  }

  /* ── PAGE SETUP ── */
  @page{size:A4 portrait;margin:0;}
  @media print{
    html,body{width:210mm;height:297mm;}
    .page{page-break-after:always;page-break-inside:avoid;}
    .page:last-child{page-break-after:auto;}
    .no-print{display:none!important;}
  }

  /* ── PAGE LAYOUT ── */
  .page{
    width:210mm;min-height:297mm;position:relative;
    overflow:hidden;background:#fff;
    display:flex;flex-direction:column;
  }

  /* ── WATERMARK: full page background ── */
  .wm{
    position:absolute;inset:0;z-index:0;pointer-events:none;
    width:100%;height:100%;overflow:hidden;
  }
  .wm img{
    width:100%;height:100%;
    object-fit:cover;object-position:center;
    opacity:1;
    display:block;
  }

  /* ── CONTENT OVER WATERMARK ── */
  .content{
    position:relative;z-index:1;
    padding:36px 44px;flex:1;display:flex;flex-direction:column;
  }

  /* ── HEADER ── */
  .inv-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:36px;}
  .logo-img{height:28px;width:auto;display:block;}
  .studio-info{text-align:right;font-size:11px;color:#555;line-height:1.7;}
  .studio-info .rc{font-size:9px;color:#bbb;margin-bottom:1px;}

  /* ── INVOICE TITLE ── */
  .inv-title{
    font-family:-apple-system,'SF Pro Display',BlinkMacSystemFont,'Helvetica Neue',sans-serif;
    font-weight:700;font-size:36px;letter-spacing:-.02em;
    color:${st.color};margin-bottom:4px;
  }
  .inv-num{
    font-family:'DM Mono','Courier New',monospace;
    font-size:12px;color:#999;margin-bottom:28px;
  }

  /* ── META GRID ── */
  .meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-bottom:28px;}
  .meta-lbl{font-size:9.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#888;margin-bottom:4px;}
  .meta-val{font-size:13.5px;font-weight:600;color:#111;line-height:1.4;}
  .meta-sub{font-size:12px;color:#444;line-height:1.55;}

  /* ── DESCRIPTION BOX ── */
  .desc-box{background:#f7f7f7;border-radius:4px;padding:12px 14px;margin-bottom:20px;}
  .desc-box .meta-lbl{margin-bottom:5px;}
  .desc-text{font-size:12.5px;color:#333;line-height:1.65;}

  /* ── TABLE ── */
  table{width:100%;border-collapse:collapse;margin-bottom:0;}
  thead tr{background:#f2f2f2;}
  th{
    font-size:8.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
    color:#888;padding:8px 12px;text-align:left;border-bottom:1.5px solid #e0e0e0;
  }
  td{padding:10px 12px;border-bottom:1px solid #e8e8e8;font-size:12.5px;color:#111;}
  tr:last-child td{border-bottom:none;}
  .td-r{text-align:right;}
  .td-c{text-align:center;}
  .td-bold{font-weight:600;color:#111;}

  /* ── TOTALS ── */
  .totals{background:#f7f7f7;padding:14px 20px;}
  .tot-row{display:flex;justify-content:space-between;font-size:12px;color:#555;margin-bottom:4px;}
  .tot-row.disc{color:#22c55e;}
  .tot-final{
    display:flex;justify-content:space-between;
    font-family:-apple-system,'SF Pro Display',BlinkMacSystemFont,'Helvetica Neue',sans-serif;
    font-size:18px;font-weight:700;color:#111;
    margin-top:8px;padding-top:10px;border-top:2px solid #ddd;
  }

  /* ── PAYMENT BOX ── */
  .pay-box{margin-top:18px;padding:14px 16px;background:#f7f7f7;border-radius:4px;border-left:3px solid ${st.color};}
  .pay-box .meta-lbl{margin-bottom:6px;}
  .pay-name{font-size:13px;font-weight:600;color:#111;}
  .pay-bank{font-size:12px;color:#555;margin-top:2px;}
  .pay-num{font-family:'DM Mono','Courier New',monospace;font-size:12px;color:#444;margin-top:3px;}
  .pay-instr{font-size:12px;color:#666;margin-top:6px;font-style:italic;}

  /* ── FOOTER ── */
  .inv-footer{
    margin-top:auto;padding-top:18px;border-top:1px solid #eee;
    font-size:9.5px;color:#bbb;text-align:center;line-height:1.7;
  }

  /* ── TERMS PAGE ── */
  .terms-title{
    font-family:-apple-system,'SF Pro Display',BlinkMacSystemFont,'Helvetica Neue',sans-serif;
    font-weight:700;font-size:22px;color:#111;margin-bottom:4px;
  }
  .terms-ref{font-size:11px;color:#999;margin-bottom:22px;}
  .terms-body{font-size:12px;color:#333;line-height:1.85;white-space:pre-wrap;}
  .sig-grid{display:grid;grid-template-columns:1fr 1fr;gap:36px;margin-top:36px;}
  .sig-line{border-top:1.5px solid #333;padding-top:7px;}
  .sig-lbl{font-size:11px;color:#666;}
  .sig-name{font-size:11px;color:#888;margin-top:4px;}

  /* ── PRINT BUTTON (screen only) ── */
  .print-btn{
    position:fixed;bottom:24px;right:24px;z-index:999;
    background:${st.color};color:#fff;border:none;border-radius:10px;
    padding:12px 22px;font-size:14px;font-weight:600;
    font-family:-apple-system,sans-serif;cursor:pointer;
    box-shadow:0 4px 20px rgba(0,0,0,.3);
  }
  .print-btn:hover{opacity:.9;}
  @media screen{.print-btn{display:none!important;}} /* auto-print, no button needed */

/* ── AUTH WALL ── */
.auth-wall{position:fixed;inset:0;background:var(--bg);z-index:1000;
  display:flex;align-items:center;justify-content:center;padding:20px;}
.auth-box{background:var(--bg2);border:1px solid var(--bd2);border-radius:18px;
  width:100%;max-width:360px;padding:36px 32px;animation:fadeIn .3s ease;}
.auth-logo{margin-bottom:28px;}
.auth-logo img{height:28px;width:auto;display:block;}
.auth-title{font-family:var(--display);font-size:20px;font-weight:700;
  color:var(--text);margin-bottom:6px;letter-spacing:-.02em;}
.auth-sub{font-size:13px;color:var(--muted);margin-bottom:26px;}
.auth-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);
  border-radius:8px;padding:10px 13px;font-size:13px;color:var(--red);
  margin-bottom:16px;}
</style>
</head>

  const url  = URL.createObjectURL(blob);
  const frameId = 'pdf-print-frame';
  let frame = document.getElementById(frameId);
  if(frame) frame.remove();
  frame = document.createElement('iframe');
  frame.id = frameId;
  frame.style.cssText = 'position:fixed;top:-9999px;left:-9999px;width:210mm;height:297mm;opacity:0;border:none;';
  document.body.appendChild(frame);
  frame.onload = function(){
    setTimeout(()=>{
      try{
        frame.contentWindow.focus();
        frame.contentWindow.print();
      }catch(e){ window.print(); }
      setTimeout(()=>{ URL.revokeObjectURL(url); }, 60000);
    }, 900);
  };
  frame.src = url;
  notify('Print dialog opening — choose "Save as PDF" as destination');
}

// ── misc ──
async function updStatus(id,status){const inv=S.invoices.find(i=>i.id===id);if(inv){inv.status=status;render();await sbUpsertInvoice(inv);notify('Status → '+status+' ✓');}}
async function dupInv(id){
  const inv=S.invoices.find(i=>i.id===id);if(!inv)return;
  const d=JSON.parse(JSON.stringify(inv));
  d.id=nextId();d.status='draft';d.payments=[];
  d.date=new Date().toISOString().split('T')[0];
  d.due=new Date(Date.now()+14*864e5).toISOString().split('T')[0];
  S.invoices.unshift(d);render();
  await sbUpsertInvoice(d);
  notify('Duplicated · '+d.id+' ✓');
}

// ── charts ──
let cRChart=null,cSChart=null;
function getMonthlyData(){
  const now=new Date();
  const p=S.fperiod;
  let labels,exp,col;

  if(p==='today'||p==='week'){
    // Show last 7 days
    labels=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    exp=Array(7).fill(0); col=Array(7).fill(0);
    S.invoices.forEach(inv=>{
      if(inv.status==='cancelled'||inv.status==='draft'||!inv.date) return;
      const d=new Date(inv.date);
      const dayDiff=Math.floor((now-d)/(1000*60*60*24));
      if(dayDiff<0||dayDiff>6) return;
      const dow=(d.getDay()+6)%7; // Mon=0
      const c=calc(inv);
      exp[dow]+=Math.round(c.tot/1000);
      col[dow]+=Math.round(c.paid/1000);
    });
  } else if(p==='month'){
    // Show days of current month
    const days=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
    labels=Array.from({length:days},(_,i)=>String(i+1));
    exp=Array(days).fill(0); col=Array(days).fill(0);
    S.invoices.forEach(inv=>{
      if(inv.status==='cancelled'||inv.status==='draft'||!inv.date) return;
      const d=new Date(inv.date);
      if(d.getMonth()!==now.getMonth()||d.getFullYear()!==now.getFullYear()) return;
      const day=d.getDate()-1;
      const c=calc(inv);
      exp[day]+=Math.round(c.tot/1000);
      col[day]+=Math.round(c.paid/1000);
    });
  } else if(p==='quarter'){
    // Show 3 months of current quarter
    const qStart=Math.floor(now.getMonth()/3)*3;
    labels=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'].slice(qStart,qStart+3);
    exp=Array(3).fill(0); col=Array(3).fill(0);
    S.invoices.forEach(inv=>{
      if(inv.status==='cancelled'||inv.status==='draft'||!inv.date) return;
      const d=new Date(inv.date);
      if(d.getFullYear()!==now.getFullYear()) return;
      const mIdx=d.getMonth()-qStart;
      if(mIdx<0||mIdx>2) return;
      const c=calc(inv);
      exp[mIdx]+=Math.round(c.tot/1000);
      col[mIdx]+=Math.round(c.paid/1000);
    });
  } else if(p==='all'){
    // Show years
    const yrs=[...new Set(S.invoices.map(i=>i.date?new Date(i.date).getFullYear():null).filter(Boolean))].sort();
    if(yrs.length===0){labels=['—'];exp=[0];col=[0];}
    else{
      labels=yrs.map(String);
      exp=Array(yrs.length).fill(0); col=Array(yrs.length).fill(0);
      S.invoices.forEach(inv=>{
        if(inv.status==='cancelled'||inv.status==='draft'||!inv.date) return;
        const yr=new Date(inv.date).getFullYear();
        const i=yrs.indexOf(yr); if(i<0) return;
        const c=calc(inv);
        exp[i]+=Math.round(c.tot/1000);
        col[i]+=Math.round(c.paid/1000);
      });
    }
  } else {
    // Year — 12 months
    labels=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    exp=Array(12).fill(0); col=Array(12).fill(0);
    S.invoices.forEach(inv=>{
      if(inv.status==='cancelled'||inv.status==='draft'||!inv.date) return;
      const d=new Date(inv.date);
      if(d.getFullYear()!==now.getFullYear()) return;
      const c=calc(inv);
      exp[d.getMonth()]+=Math.round(c.tot/1000);
      col[d.getMonth()]+=Math.round(c.paid/1000);
    });
  }
  return{labels,exp,col};
}
function initCharts(){
  const rc=document.getElementById('cR');
  if(rc&&!cRChart){
    const {labels,exp,col}=getMonthlyData();
    cRChart=new Chart(rc,{type:'bar',data:{labels,datasets:[{label:'Expected',data:exp,backgroundColor:'rgba(242,100,25,.25)',borderColor:'#F26419',borderWidth:1.5,borderRadius:3},{label:'Collected',data:col,backgroundColor:'rgba(34,197,94,.3)',borderColor:'#22c55e',borderWidth:1.5,borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#555',font:{size:10}},grid:{color:'rgba(255,255,255,.03)'}},y:{ticks:{color:'#555',font:{size:10},callback:v=>'₦'+v+'k'},grid:{color:'rgba(255,255,255,.03)'}}}}});
  }
  const sc=document.getElementById('cS');
  if(sc&&!cSChart){
    const invs=S.invoices;
    const data=['paid','partial','sent','deposit','overdue','draft'].map(s=>invs.filter(i=>i.status===s).length);
    cSChart=new Chart(sc,{type:'doughnut',data:{labels:['Paid','Partial','Sent','Deposit','Overdue','Draft'],datasets:[{data,backgroundColor:['rgba(34,197,94,.7)','rgba(168,85,247,.7)','rgba(0,212,232,.7)','rgba(234,179,8,.7)','rgba(239,68,68,.7)','rgba(100,100,100,.5)'],borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{display:false}}}});
  }
}
// Destroy and recreate charts on each dashboard visit so data stays current

// ── connect Supabase from settings UI ──
async function connectSupabase(){
  const url = document.getElementById('sb-url')?.value?.trim();
  const key = document.getElementById('sb-key')?.value?.trim();
  if(!url || !key){ notify('Enter both URL and anon key','err'); return; }
  if(!url.startsWith('https://')){ notify('URL must start with https://','err'); return; }
  try{
    db = window.supabase.createClient(url, key);
    // test connection
    const {error} = await db.from('invoices').select('id').limit(1);
    if(error) throw error;
    notify('Connected! Syncing data…');
    // Store in localStorage so it persists
    localStorage.setItem('1204sb_url', url);
    localStorage.setItem('1204sb_key', key);
    await loadFromSupabase();
    notify('Supabase connected ✓ Data synced');
  }catch(e){
    db = null;
    notify('Connection failed: '+e.message,'err');
    console.error(e);
  }
}

async function saveExpense(){
  const date   = document.getElementById('ex-date').value;
  const amount = parseFloat(document.getElementById('ex-amount').value)||0;
  const description = document.getElementById('ex-desc').value.trim();
  const coa_code = document.getElementById('ex-coa').value;
  if(!date||!amount||!description){ notify('Date, amount and description are required','err'); return; }
  const exp = {
    id:'exp'+Date.now(), date, amount, description,
    supplier: document.getElementById('ex-supplier').value,
    method:   document.getElementById('ex-method').value,
    coa_code,
    receipt:  document.getElementById('ex-receipt').value,
    notes:    document.getElementById('ex-notes').value,
    currency: 'NGN',
  };
  S.expenses.unshift(exp);
  closeModal();
  await sbUpsertExpense(exp);
  notify('Expense logged ✓');
}

async function deleteExpense(id){
  if(!confirm('Delete this expense?')) return;
  S.expenses = S.expenses.filter(e=>e.id!==id);
  render();
  await sbDeleteExpense(id);
  notify('Expense deleted');
}

function getPeriodExpenses(){
  const invs=S.expenses;
  const now=new Date(), yr=now.getFullYear(), mo=now.getMonth();
  if(S.fperiod==='month')  return invs.filter(e=>{ const d=new Date(e.date); return d.getFullYear()===yr&&d.getMonth()===mo; });
  if(S.fperiod==='quarter'){ const q=Math.floor(mo/3); return invs.filter(e=>{ const d=new Date(e.date); return d.getFullYear()===yr&&Math.floor(d.getMonth()/3)===q; }); }
  if(S.fperiod==='year')   return invs.filter(e=>new Date(e.date).getFullYear()===yr);
  return invs;
}

function rPL(){
  const invs   = getPeriodInvoices();
  const exps   = getPeriodExpenses();

  // Revenue by COA account
  const revByAcc = {};
  invs.forEach(inv=>{

    const code = catToCoaCode(inv.category);
    const acc  = S.coa.find(a=>a.code===code)||{name:'Other Income',code:'4900'};
    const tot  = calc(inv).tot;
    if(!revByAcc[code]) revByAcc[code]={name:acc.name,code,total:0,collected:0};
    revByAcc[code].total     += tot;
    revByAcc[code].collected += calc(inv).paid;
  });

  // Expenses by COA account
  const expByAcc = {};
  exps.forEach(exp=>{
    const acc = S.coa.find(a=>a.code===exp.coa_code)||{name:'Miscellaneous',code:'5900'};
    if(!expByAcc[exp.coa_code]) expByAcc[exp.coa_code]={name:acc.name,code:exp.coa_code,total:0};
    expByAcc[exp.coa_code].total += (+exp.amount||0);
  });

  const totalRevExpected  = Object.values(revByAcc).reduce((s,r)=>s+r.total,0);
  const totalRevCollected = Object.values(revByAcc).reduce((s,r)=>s+r.collected,0);
  const totalExpenses     = Object.values(expByAcc).reduce((s,e)=>s+e.total,0);
  const grossProfit       = totalRevCollected - totalExpenses;
  const grossMargin       = totalRevCollected>0?Math.round(grossProfit/totalRevCollected*100):0;

  // Export CSV
  const csvRows = [
    ['Account Code','Account Name','Type','Amount (NGN)'],
    ...Object.values(revByAcc).map(r=>[r.code,r.name,'Revenue',r.collected]),
    ['','TOTAL REVENUE','',totalRevCollected],
    ['','','',''],
    ...Object.values(expByAcc).map(e=>[e.code,e.name,'Expense',e.total]),
    ['','TOTAL EXPENSES','',totalExpenses],
    ['','','',''],
    ['','GROSS PROFIT','',grossProfit],
    ['','GROSS MARGIN','',grossMargin+'%'],
  ];
  const csv = csvRows.map(r=>r.join(',')).join('
');

function rBS(){
  // Simple balance sheet — assets = cash collected, receivables
  const invs = S.invoices.filter(i=>i.status!=='cancelled'&&i.status!=='draft');
  const collected  = invs.reduce((s,i)=>s+calc(i).paid,0);
  const receivable = invs.reduce((s,i)=>s+calc(i).rem,0);
  const totalExp   = S.expenses.reduce((s,e)=>s+(+e.amount||0),0);
  const retained   = collected - totalExp;

  return `
<div style="font-family:var(--display);font-size:15px;font-weight:700;color:var(--text);margin-bottom:20px">Balance Sheet — All Time</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px" class="fr">
  <!-- ASSETS -->
  <div class="card">
    <div class="ch"><div class="ct" style="color:var(--cyan)">Assets</div></div>
    <table class="tbl"><thead><tr><th>Account</th><th style="text-align:right">Value</th></tr></thead><tbody>
      <tr><td>1100 — Cash & Bank (collected)</td><td style="text-align:right;color:var(--cyan);font-weight:600">${fc(collected,'NGN')}</td></tr>
      <tr><td>1200 — Accounts Receivable</td><td style="text-align:right;color:var(--orange);font-weight:600">${fc(receivable,'NGN')}</td></tr>
      <tr style="background:var(--bg3)"><td><strong>Total Assets</strong></td><td style="text-align:right"><strong>${fc(collected+receivable,'NGN')}</strong></td></tr>
    </tbody></table>
  </div>
  <!-- EQUITY -->
  <div class="card">
    <div class="ch"><div class="ct" style="color:var(--purple)">Equity</div></div>
    <table class="tbl"><thead><tr><th>Account</th><th style="text-align:right">Value</th></tr></thead><tbody>
      <tr><td>5000s — Total Expenses</td><td style="text-align:right;color:var(--red);font-weight:600">−${fc(totalExp,'NGN')}</td></tr>
      <tr><td>3200 — Retained Earnings</td><td style="text-align:right;color:${retained>=0?'var(--green)':'var(--red)'};font-weight:600">${fc(retained,'NGN')}</td></tr>
      <tr style="background:var(--bg3)"><td><strong>Total Equity</strong></td><td style="text-align:right"><strong>${fc(Math.max(0,retained),'NGN')}</strong></td></tr>
    </tbody></table>
  </div>
</div>
<div style="margin-top:14px;padding:14px 18px;background:var(--bg3);border-radius:8px;border:1px solid var(--bd);font-size:12.5px;color:var(--muted)">

function downloadCSV(filename, csv){
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=filename+'.csv'; a.click();
  URL.revokeObjectURL(url);
  notify('CSV exported ✓');
}

function dlAllInvoices(invList){
  if(!invList||invList.length===0){notify('No invoices to download','err');return;}
  notify('Preparing '+invList.length+' invoice'+(invList.length>1?'s':'')+'…');
  invList.forEach((inv,i)=>{
    setTimeout(()=>dlPDF(inv.id),i*400);
  });
}

const AUTH_KEY = '1204studios_auth_v1';
const PASSCODE  = '1204admin'; // change this — store hashed in production

function checkStoredAuth(){
  try{
    const t = localStorage.getItem(AUTH_KEY);
    if(t && (Date.now() - parseInt(t)) < 8*60*60*1000){ // 8h session
      S.authed = true;
    }
  }catch(e){}
}

function submitAuth(){
  const val = document.getElementById('auth-input')?.value?.trim();
  if(val === PASSCODE){
    S.authed = true;
    S.authErr = '';
    try{ localStorage.setItem(AUTH_KEY, Date.now().toString()); }catch(e){}
    render();
  } else {
    S.authErr = 'Incorrect passcode. Try again.';
    render();
    document.getElementById('auth-input')?.focus();
  }
}

function logout(){
  S.authed = false;
  S.authErr = '';
  try{ localStorage.removeItem(AUTH_KEY); }catch(e){}
  render();
}
